<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #000);
    color:white;
}

/* header */
.header{
    padding:20px;
    text-align:center;
    border-bottom:1px solid rgba(0,255,200,0.3);
}
.header h2{
    color:#00ffc3;
    text-shadow:0 0 10px #00ffc3;
}

/* info */
.info{
    text-align:center;
    margin:20px;
}

/* video */
.video-container{
    text-align:center;
    position:relative;
}
iframe{
    width:90%;
    max-width:800px;
    height:400px;
    border-radius:12px;
    border:2px solid #00ffc3;
    box-shadow:0 0 20px rgba(0,255,200,0.4);
}

/* button */
.main-btn{
    display:block;
    margin:20px auto;
    padding:12px 25px;
    border:none;
    border-radius:10px;
    background:#00ffc3;
    color:black;
    font-weight:bold;
    cursor:pointer;
}
.main-btn:hover{
    box-shadow:0 0 15px #00ffc3;
}

/* controller */
.controller{
    position:absolute;
    top:50%;
    left:0;
    width:100%;
    transform:translateY(-50%);
    display:flex;
    justify-content:space-between;
    padding:0 10px;
    pointer-events:none;
}

.dpad{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.action{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.btn{
    width:70px;
    height:70px;
    border-radius:50%;
    border:none;
    font-size:24px;
    cursor:pointer;
    color:white;
    background:rgba(0,0,0,0.4);
    backdrop-filter:blur(10px);
    transition:0.2s;
    box-shadow:0 0 10px rgba(0,255,200,0.3);
    pointer-events:auto;
}
.btn:hover{
    transform:scale(1.1);
}
.btn:disabled{
    opacity:0.6;
}

/* colors */
.green{background:#00ff88;}
.red{background:#ff3b3b;}
.blue{background:#3399ff;}
.pink{background:#d633ff;}

/* timers */
#cooldownTimer{
    text-align:center;
    margin-top:15px;
    color:red;
}
#delayTimer{
    text-align:center;
    color:yellow;
}

/* popup ad */
#adPopup{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    justify-content:center;
    align-items:center;
    z-index:9999;
}
</style>
</head>

<body>

<div class="header">
<h2>🎮 Dashboard</h2>
</div>

<div class="info">
Welcome <b>{{name}}</b><br>
Player ID: <b>{{player_id}}</b>
</div>

<div class="video-container">
<iframe src="https://www.youtube.com/embed/{{video_id}}" allowfullscreen></iframe>

<div class="controller">

<div class="dpad">
<button onclick="sendCmd('up')" class="btn">▲</button>
<button onclick="sendMove('left')" class="btn">◀</button>
<button onclick="sendCmd('down')" class="btn">▼</button>
<button onclick="sendMove('right')" class="btn">▶</button>
</div>

<div class="action">
<button id="greenBtn" onclick="handleGreen()" class="btn green">▲</button>
<button id="redBtn" onclick="handleRed()" class="btn red">●</button>
<button id="blueBtn" onclick="handleBlue()" class="btn blue">✖</button>
<button id="pinkBtn" onclick="handlePink()" class="btn pink">■</button>
</div>

</div>
</div>

<div id="cooldownTimer"></div>
<div id="delayTimer"></div>

<button class="main-btn" onclick="addBall()">⚡ ADD BALL</button>

<script>

function startCooldown(btn, time, text){
btn.disabled = true;
let t = time;

let i = setInterval(()=>{
btn.innerText = t + "s";
t--;
if(t < 0){
clearInterval(i);
btn.innerText = text;
btn.disabled = false;
}
},1000);
}

function handleGreen(){
let btn = document.getElementById("greenBtn");
fetch("/sendCmd",{method:"POST",credentials:"include"});
startCooldown(btn,20,"▲");
}

function handleRed(){
let btn = document.getElementById("redBtn");
fetch("/give_new_power",{method:"POST",credentials:"include"});
startCooldown(btn,20,"●");
}

function handleBlue(){
let btn = document.getElementById("blueBtn");
fetch("/give_portal_power",{method:"POST",credentials:"include"});
startCooldown(btn,20,"✖");
}

function handlePink(){
let btn = document.getElementById("pinkBtn");
fetch("/give_power",{method:"POST",credentials:"include"});
startCooldown(btn,20,"■");
}

function addBall(){
fetch("/add_player",{method:"POST",credentials:"include"});
}

function sendMove(dir){
fetch("/move",{
method:"POST",
credentials:"include",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({direction:dir})
})
}

</script>

</body>
</html>
