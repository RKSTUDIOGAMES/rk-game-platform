<!DOCTYPE html>
<html>
<head>

<title>Forgot Password</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background: radial-gradient(circle at top, #0f2027, #203a43, #000);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
}

.container{
    width:100%;
    display:flex;
    justify-content:center;
    padding:20px;
}

.card{
    background: rgba(0,0,0,0.8);
    border:1px solid rgba(0,255,200,0.3);
    padding:35px;
    border-radius:15px;
    width:90%;
    max-width:400px;
    box-shadow: 0 0 25px rgba(0,255,200,0.4);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#00ffc3;
    text-shadow:0 0 10px #00ffc3;
}

p{
    text-align:center;
    font-size:14px;
    color:#aaa;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    border-radius:8px;
    margin-bottom:12px;
    outline:none;
    background:#111;
    color:#00ffc3;
    border:1px solid #00ffc3;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:#00ffc3;
    color:black;
    font-weight:bold;
    cursor:pointer;
    margin-top:10px;
    transition:0.3s;
}

button:hover{
    background:#00e6b0;
    box-shadow:0 0 15px #00ffc3;
}

.back{
    margin-top:20px;
    text-align:center;
}

.back a{
    color:#d633ff;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="container">
<div class="card">

<h2>🔐 Forgot Password</h2>

<p>Enter your email to receive OTP</p>

<form method="post">

<input name="email" placeholder="Enter Email" required>

<button type="submit">Send OTP</button>

</form>

<div class="back">
<a href="/login">⬅ Back to Login</a>
</div>

</div>
</div>

</body>
</html>
